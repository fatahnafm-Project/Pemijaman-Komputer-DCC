<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCC Platform - Buat Password Baru</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-100 overflow-hidden text-slate-800">
        <div class="bg-emerald-700 text-white p-6 text-center">
            <i class="fa-solid fa-lock-open text-4xl text-amber-400 mb-2"></i>
            <h1 class="text-xl font-bold tracking-wide">Create New Password</h1>
            <p class="text-xs text-emerald-200 mt-1">Setup your new secure access credentials</p>
        </div>
        
        <form id="updatePasswordForm" class="p-6 space-y-4">
            <p class="text-xs text-slate-500">
                Silakan ketikkan kata sandi baru Anda yang aman di bawah ini. Minimal terdiri dari 6 karakter.
            </p>

            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">New Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-lock text-xs"></i>
                    </span>
                    <input type="password" id="newPassword" required minlength="6" placeholder="••••••••" 
                        class="w-full border border-slate-300 rounded-lg pl-9 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
                </div>
            </div>

            <div id="message" class="hidden p-3 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-lg text-xs flex items-center space-x-2">
                <i class="fa-solid fa-circle-check"></i>
                <span>Password berhasil diperbarui! Mengarahkan kembali ke login...</span>
            </div>
            
            <div id="errorMessage" class="hidden p-3 bg-red-50 border border-red-200 text-red-800 rounded-lg text-xs flex items-center space-x-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Gagal memperbarui password.</span>
            </div>

            <button type="submit" id="btnUpdate" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-sm flex items-center justify-center cursor-pointer">
                <i class="fa-solid fa-shield-halved mr-2" id="iconShield"></i>
                <i class="fa-solid fa-spinner animate-spin mr-2 hidden" id="iconSpinner"></i>
                <span>Simpan Password Baru</span>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://qufiavhyxiiklalcgklk.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1Zmlhdmh5eGlpa2xhbGNna2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTA2MzEsImV4cCI6MjA5NTQ4NjYzMX0.Ywsf6lQ6InM6W35fiqyqIXil7V33X402VhRznUcMAFo";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const messageBox = document.getElementById('message');
            const errorBox = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            const btnUpdate = document.getElementById('btnUpdate');
            const iconShield = document.getElementById('iconShield');
            const iconSpinner = document.getElementById('iconSpinner');

            messageBox.classList.add('hidden');
            errorBox.classList.add('hidden');
            btnUpdate.disabled = true;
            iconShield.classList.add('hidden');
            iconSpinner.classList.remove('hidden');

            const { data, error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            btnUpdate.disabled = false;
            iconShield.classList.remove('hidden');
            iconSpinner.classList.add('hidden');

            if (error) {
                errorText.innerText = error.message;
                errorBox.classList.remove('hidden');
            } else {
                messageBox.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>
